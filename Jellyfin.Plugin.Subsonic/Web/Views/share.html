<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{DESCRIPTION}} — Subfin</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; color: #eee; background: #1a1a1a; }
    h1 { font-size: 1.3rem; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .player { background: #252525; border: 1px solid #444; border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .now-playing { font-size: 1rem; font-weight: 600; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .now-artist  { font-size: 0.85rem; color: #aaa; margin-bottom: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    audio { width: 100%; height: 36px; accent-color: #0070f3; }
    .tracklist { list-style: none; padding: 0; margin: 1rem 0 0; }
    .tracklist li { display: flex; align-items: center; gap: 0.6rem; padding: 0.45rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .tracklist li:hover { background: #333; }
    .tracklist li.active { background: #1a2f4a; color: #5ab0ff; }
    .track-num { width: 1.5rem; text-align: right; color: #666; font-size: 0.8rem; flex-shrink: 0; }
    .track-info { flex: 1; min-width: 0; }
    .track-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track-meta { font-size: 0.78rem; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .track-dur { color: #666; font-size: 0.8rem; flex-shrink: 0; }
    .download-links { margin-top: 1rem; display: flex; gap: 1.25rem; }
    .download-link { font-size: 0.82rem; color: #666; text-decoration: none; }
    .download-link:hover { color: #aaa; }
    .empty { color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>{{DESCRIPTION}}</h1>
  <p class="subtitle" id="trackCount"></p>

  <div class="player" id="playerCard" style="display:none">
    <div class="now-playing" id="npTitle">—</div>
    <div class="now-artist" id="npArtist"></div>
    <audio id="audio" controls preload="none"></audio>
  </div>

  <ul class="tracklist" id="tracklist"></ul>
  <p class="empty" id="emptyMsg" style="display:none">No tracks in this share.</p>

  <div class="download-links">
    <a class="download-link" href="/subfin/share/{{SHARE_UID}}/m3u?secret={{SECRET}}">↓ Download M3U playlist</a>
    <a class="download-link" href="/subfin/share/{{SHARE_UID}}/download?secret={{SECRET}}">↓ Download ZIP</a>
  </div>

  <script>
    const tracks = {{TRACKS_JSON}};
    const audio = document.getElementById('audio');
    const npTitle = document.getElementById('npTitle');
    const npArtist = document.getElementById('npArtist');
    const playerCard = document.getElementById('playerCard');
    const list = document.getElementById('tracklist');
    let currentIndex = -1;

    function formatDur(s) {
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2,'0')}`;
    }

    if (!tracks.length) {
      document.getElementById('emptyMsg').style.display = '';
    } else {
      document.getElementById('trackCount').textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;
      playerCard.style.display = '';

      list.innerHTML = tracks.map((t, i) => `
        <li id="tr-${i}" onclick="play(${i})">
          <span class="track-num">${i + 1}</span>
          <span class="track-info">
            <div class="track-title">${esc(t.title)}</div>
            <div class="track-meta">${esc(t.artist)}${t.album ? ' · ' + esc(t.album) : ''}</div>
          </span>
          <span class="track-dur">${formatDur(t.duration)}</span>
        </li>`).join('');

      // Auto-advance
      audio.addEventListener('ended', () => { if (currentIndex + 1 < tracks.length) play(currentIndex + 1); });

      play(0);
    }

    function play(i) {
      if (i < 0 || i >= tracks.length) return;
      const t = tracks[i];
      if (currentIndex >= 0) document.getElementById(`tr-${currentIndex}`)?.classList.remove('active');
      currentIndex = i;
      document.getElementById(`tr-${i}`)?.classList.add('active');
      npTitle.textContent = t.title;
      npArtist.textContent = [t.artist, t.album].filter(Boolean).join(' · ');
      audio.src = t.streamUrl;
      audio.play().catch(() => {});
      document.getElementById(`tr-${i}`)?.scrollIntoView({ block: 'nearest' });
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
