<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subfin — Subsonic Device Manager</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #eee; background: #1a1a1a; }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .card { border: 1px solid #444; border-radius: 8px; padding: 1rem 1.25rem; margin: 1rem 0; background: #252525; }
    h2 { font-size: 1rem; margin: 0 0 0.75rem; }
    label { display: block; font-size: 0.875rem; color: #aaa; margin-bottom: 0.2rem; }
    input[type=text] { display: block; width: 100%; box-sizing: border-box; padding: 0.4rem 0.6rem; background: #333; color: #eee; border: 1px solid #555; border-radius: 4px; margin-bottom: 0.75rem; }
    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button { cursor: pointer; padding: 0.4rem 0.9rem; background: #0070f3; color: #fff; border: none; border-radius: 4px; font-size: 0.875rem; }
    button.secondary { background: #444; }
    button.danger { background: #b00; }
    button:disabled { opacity: 0.4; cursor: default; }
    #banner { padding: 0.6rem 0.8rem; border-radius: 4px; margin-bottom: 1rem; display: none; font-size: 0.875rem; word-break: break-all; white-space: pre-wrap; }
    #banner.ok  { background: #1a3d1a; color: #6cda6c; display: block; }
    #banner.err { background: #3d1a1a; color: #da6c6c; display: block; }
    .device-row { display: flex; align-items: center; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #333; }
    .device-row:last-child { border-bottom: none; }
    .device-info { flex: 1; min-width: 0; }
    .device-label { font-size: 0.95rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .device-meta  { font-size: 0.78rem; color: #888; margin-top: 0.1rem; }
    #deviceList { margin-top: 0.5rem; }
    #noDevices { color: #888; font-size: 0.875rem; margin: 0.5rem 0; }
    .lib-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0; font-size: 0.9rem; }
    .share-row { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.6rem 0; border-bottom: 1px solid #333; }
    .share-row:last-child { border-bottom: none; }
    .share-info { flex: 1; min-width: 0; font-size: 0.875rem; }
    .share-desc { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .share-meta { font-size: 0.78rem; color: #888; margin-top: 0.1rem; }
    .share-url  { font-size: 0.78rem; color: #5ab0ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Subsonic Device Manager</h1>
  <p class="subtitle" id="subtitle">Loading…</p>

  <div id="banner"></div>

  <div class="card">
    <h2>Link a New Device</h2>
    <label for="deviceLabel">Device label (optional — e.g. "DSub on Phone")</label>
    <input type="text" id="deviceLabel" placeholder="My Phone">
    <div class="btn-row">
      <button id="linkBtn" onclick="linkDevice()" disabled>Link Device</button>
    </div>
  </div>

  <div class="card">
    <h2>Linked Devices</h2>
    <div id="deviceList"><p id="noDevices" style="display:none">No devices linked yet.</p></div>
  </div>

  <div class="card" id="sharesCard" style="display:none">
    <h2 id="sharesTitle">Shares</h2>
    <div id="sharesList"></div>
  </div>

  <div class="card" id="libraryCard" style="display:none">
    <h2>Library Selection</h2>
    <p style="font-size:0.875rem;color:#aaa;margin:0 0 0.75rem">
      Choose which Jellyfin music libraries appear in Subsonic clients.
      Deselect all to show all libraries.
    </p>
    <div id="libraryList"></div>
    <div class="btn-row" style="margin-top:0.75rem">
      <button id="saveLibBtn" onclick="saveLibraries()">Save</button>
    </div>
  </div>

  <script>
    // ── Jellyfin session ──────────────────────────────────────────────────────

    let token = null;
    let currentUsername = null;

    function authHeaders() {
      return token ? { 'Authorization': `MediaBrowser Token="${token}"` } : {};
    }

    function readStoredToken() {
      try {
        const raw = localStorage.getItem('jellyfin_credentials');
        if (!raw) return null;
        const creds = JSON.parse(raw);
        const servers = creds?.Servers ?? creds?.servers ?? [];
        for (const s of servers) {
          const t = s.AccessToken ?? s.accessToken;
          if (t) return t;
        }
      } catch {}
      return null;
    }

    async function init() {
      token = readStoredToken();
      if (!token) {
        // No local credentials — send to Jellyfin login
        window.location.replace('/web/index.html#!/login.html');
        return;
      }

      const r = await fetch('/Subsonic/api/me', { headers: authHeaders() });
      if (r.status === 401) {
        window.location.replace('/web/index.html#!/login.html');
        return;
      }
      if (!r.ok) {
        showBanner('Could not load session info (' + r.status + '). Try refreshing.', false);
        return;
      }

      const me = await r.json();
      currentUsername = me.name;
      document.getElementById('subtitle').textContent = `Logged in as ${me.name}`;
      document.getElementById('linkBtn').disabled = false;
      loadDevices();
      loadLibraries();
      loadShares(me);
    }

    // ── Banner ────────────────────────────────────────────────────────────────

    function showBanner(msg, ok) {
      const el = document.getElementById('banner');
      el.textContent = msg;
      el.style.display = '';
      el.className = ok ? 'ok' : 'err';
    }

    function clearBanner() {
      const el = document.getElementById('banner');
      el.className = '';
      el.style.display = '';
    }

    // ── Link device ───────────────────────────────────────────────────────────

    async function linkDevice() {
      clearBanner();
      const label = document.getElementById('deviceLabel').value.trim();
      const r = await fetch('/Subsonic/api/devices/link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ deviceLabel: label }),
      });
      const d = await r.json();
      if (!r.ok) { showBanner(JSON.stringify(d), false); return; }
      showBanner(
        `Device linked!\n\nSubsonic username: ${d.subsonicUsername}\nPassword: ${d.password}\n\nSave this password — it won't be shown again.`,
        true
      );
      document.getElementById('deviceLabel').value = '';
      loadDevices();
      loadLibraries();
    }

    // ── Device list ───────────────────────────────────────────────────────────

    async function loadDevices() {
      const r = await fetch('/Subsonic/api/devices', { headers: authHeaders() });
      if (!r.ok) { showBanner('Could not load devices (' + r.status + ')', false); return; }
      const devices = await r.json();

      const list = document.getElementById('deviceList');
      const none = document.getElementById('noDevices');

      if (!devices.length) {
        list.innerHTML = '<p id="noDevices">No devices linked yet.</p>';
        return;
      }

      list.innerHTML = devices.map(d => `
        <div class="device-row" id="device-${d.Id}">
          <div class="device-info">
            <div class="device-label">${escHtml(d.DeviceLabel || '(no label)')}</div>
            <div class="device-meta">username: ${escHtml(d.SubsonicUsername)} &nbsp;·&nbsp; linked ${escHtml(d.CreatedAt)}</div>
          </div>
          <div class="btn-row">
            <button class="secondary" onclick="resetPassword(${d.Id})">Reset Password</button>
            <button class="danger" onclick="deleteDevice(${d.Id})">Unlink</button>
          </div>
        </div>`).join('');
    }

    async function deleteDevice(id) {
      if (!confirm('Unlink this device? The Subsonic client using it will stop working.')) return;
      const r = await fetch(`/Subsonic/api/devices/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (!r.ok) { showBanner('Unlink failed (' + r.status + ')', false); return; }
      document.getElementById(`device-${id}`)?.remove();
      const list = document.getElementById('deviceList');
      if (!list.querySelector('.device-row'))
        list.innerHTML = '<p id="noDevices">No devices linked yet.</p>';
    }

    async function resetPassword(id) {
      if (!confirm('Reset the password for this device? The Subsonic client will need to be reconfigured.')) return;
      const r = await fetch(`/Subsonic/api/devices/${id}/reset-password`, { method: 'POST', headers: authHeaders() });
      const d = await r.json();
      if (!r.ok) { showBanner('Reset failed (' + r.status + ')', false); return; }
      showBanner(`New password: ${d.password}\n\nUpdate your Subsonic client — this won't be shown again.`, true);
    }

    // ── Library selection ─────────────────────────────────────────────────────

    let libraryFolders = [];

    async function loadLibraries() {
      if (!currentUsername) return;
      const r = await fetch(`/Subsonic/api/libraries?username=${encodeURIComponent(currentUsername)}`, { headers: authHeaders() });
      if (!r.ok) { document.getElementById('libraryCard').style.display = 'none'; return; }
      const data = await r.json();
      libraryFolders = data.folders;
      const list = document.getElementById('libraryList');
      list.innerHTML = data.folders.map(f => `
        <div class="lib-row">
          <input type="checkbox" id="lib-${escHtml(f.id)}" value="${escHtml(f.id)}"${data.selected.includes(f.id) ? ' checked' : ''}>
          <label for="lib-${escHtml(f.id)}">${escHtml(f.name)}</label>
        </div>`).join('');
      document.getElementById('libraryCard').style.display = '';
    }

    async function saveLibraries() {
      const selectedIds = libraryFolders
        .filter(f => document.getElementById(`lib-${f.id}`)?.checked)
        .map(f => f.id);
      const r = await fetch('/Subsonic/api/libraries', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ username: currentUsername, selectedIds }),
      });
      if (!r.ok) { showBanner('Failed to save library settings (' + r.status + ')', false); return; }
      showBanner('Library selection saved.', true);
    }

    // ── Shares ────────────────────────────────────────────────────────────────

    let isAdmin = false;

    async function loadShares(me) {
      // Detect admin by trying the admin endpoint
      const adminR = await fetch('/Subsonic/api/admin/shares', { headers: authHeaders() });
      if (adminR.ok) {
        isAdmin = true;
        const all = await adminR.json();
        renderShares(all, true);
        return;
      }
      // Fall back to own shares
      const r = await fetch('/Subsonic/api/shares', { headers: authHeaders() });
      if (!r.ok) return;
      const shares = await r.json();
      renderShares(shares, false);
    }

    function renderShares(shares, admin) {
      const card = document.getElementById('sharesCard');
      const title = document.getElementById('sharesTitle');
      const list = document.getElementById('sharesList');
      title.textContent = admin ? 'Shares (Admin)' : 'My Shares';
      if (!shares.length) {
        list.innerHTML = '<p style="font-size:0.875rem;color:#888;margin:0.5rem 0">No shares.</p>';
        card.style.display = '';
        return;
      }
      list.innerHTML = shares.map(s => {
        const desc = s.description || '(no description)';
        const created = s.created ? new Date(s.created).toLocaleDateString() : '—';
        const expires = s.expires ? new Date(s.expires).toLocaleDateString() : 'never';
        const meta = `${admin ? 'by ' + escHtml(s.username || '') + ' · ' : ''}created ${created} · expires ${expires} · ${s.visitCount ?? 0} visit${s.visitCount !== 1 ? 's' : ''}`;
        const deleteEndpoint = admin ? `/Subsonic/api/admin/shares/${s.uid}` : `/Subsonic/api/shares/${s.uid}`;
        return `<div class="share-row" id="share-${escHtml(s.uid)}">
          <div class="share-info">
            <div class="share-desc">${escHtml(desc)}</div>
            <div class="share-meta">${meta}</div>
            <div class="share-url" onclick="copyShareUrl('${escHtml(s.url)}')" title="Click to copy">${escHtml(s.url)}</div>
          </div>
          <div class="btn-row">
            <button class="danger" onclick="deleteShare('${escHtml(s.uid)}','${escHtml(deleteEndpoint)}')">Delete</button>
          </div>
        </div>`;
      }).join('');
      card.style.display = '';
    }

    async function deleteShare(uid, endpoint) {
      if (!confirm('Delete this share? Anyone with the link will lose access.')) return;
      const r = await fetch(endpoint, { method: 'DELETE', headers: authHeaders() });
      if (!r.ok) { showBanner('Delete failed (' + r.status + ')', false); return; }
      document.getElementById(`share-${uid}`)?.remove();
      const card = document.getElementById('sharesCard');
      if (!card.querySelector('.share-row'))
        document.getElementById('sharesList').innerHTML = '<p style="font-size:0.875rem;color:#888;margin:0.5rem 0">No shares.</p>';
    }

    function copyShareUrl(url) {
      navigator.clipboard.writeText(url).then(() => showBanner('Share URL copied to clipboard.', true)).catch(() => {});
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    init();
  </script>
</body>
</html>
